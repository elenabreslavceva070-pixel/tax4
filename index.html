<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Тренажёр: найди ошибки в доверенности | Компакт</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f5;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
      padding: 1rem;
      color: #1a2c3e;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
    }

    /* Основная карточка документа */
    .document-card {
      background: white;
      border-radius: 18px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .document-body {
      padding: 1rem 1.3rem;
      line-height: 1.35;
      font-size: 0.82rem;
      background: #ffffff;
    }

    #selectableText {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      font-size: 0.82rem;
    }

    /* Подсветка при выделении (синяя) */
    .selection-highlight {
      background-color: #5a9eff;
      color: white;
      border-radius: 3px;
      padding: 0 1px;
    }

    /* После проверки: правильно (зеленое) */
    .mark-correct {
      background-color: #2e7d54;
      color: white;
      border-radius: 3px;
      padding: 0 1px;
    }

    /* После проверки: неправильно (красное) */
    .mark-wrong {
      background-color: #d9534f;
      color: white;
      border-radius: 3px;
      padding: 0 1px;
    }

    .doc-date-right {
      text-align: right;
      margin-bottom: 0.6rem;
      font-size: 0.8rem;
    }

    .signature-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 1rem;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .doc-title {
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.6rem;
      letter-spacing: -0.2px;
    }

    #selectableText div {
      margin-bottom: 0.2rem;
    }

    #selectableText .doc-title {
      margin-bottom: 0.5rem;
    }

    /* Панель действий */
    .action-panel {
      background: white;
      border-radius: 16px;
      padding: 0.6rem 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      display: flex;
      justify-content: center;
      gap: 0.8rem;
    }

    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      font-family: inherit;
      font-weight: 500;
      border: none;
      padding: 0.45rem 1.2rem;
      border-radius: 40px;
      font-size: 0.78rem;
      cursor: pointer;
      background: #f0f4fa;
      color: #1f4d73;
      transition: all 0.15s;
    }

    button.primary {
      background: #1f6e9c;
      color: white;
    }

    button.primary:hover {
      background: #0f5a84;
    }

    button.secondary {
      background: #eef3fc;
      border: 1px solid #cde2f5;
    }

    button.outline {
      background: transparent;
      border: 1px solid #95CAFA;
      color: #1f6e9c;
    }

    /* Результаты панель */
    .results-panel {
      background: #ffffff;
      border-radius: 16px;
      padding: 0.8rem 1rem;
      margin-top: 0.8rem;
      border-left: 3px solid #95CAFA;
      display: none;
    }

    .mistake-feedback {
      font-size: 0.8rem;
      line-height: 1.4;
      color: #2c3e50;
    }

    .mistake-feedback .error-item {
      margin-bottom: 0.5rem;
      padding: 0.4rem 0.6rem;
      border-radius: 10px;
    }

    .mistake-feedback .error-correct {
      background: #e8f5e9;
      border-left: 2px solid #4caf50;
    }

    .mistake-feedback .error-wrong {
      background: #ffebee;
      border-left: 2px solid #f44336;
    }

    .summary-badge {
      background: #eef3fc;
      padding: 0.3rem 0.8rem;
      border-radius: 12px;
      margin-bottom: 0.6rem;
      font-weight: 500;
      font-size: 0.8rem;
      display: inline-block;
    }

    .view-sample-btn {
      margin-top: 0.6rem;
      text-align: center;
    }

    /* Модальное окно */
    .sample-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-card {
      background: white;
      max-width: 780px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1rem 1.4rem;
      border-radius: 22px;
    }

    .close-modal {
      float: right;
      font-size: 1.6rem;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .correct-doc-text {
      font-family: 'Segoe UI', monospace;
      white-space: pre-wrap;
      font-size: 0.8rem;
      line-height: 1.4;
      background: #fafcff;
      padding: 0.8rem;
      border-radius: 16px;
      clear: both;
    }

    /* Уменьшенные отступы внутри документа */
    .signature-left, .signature-right {
      font-size: 0.8rem;
    }

    #selectableText br {
      display: block;
      content: "";
      margin: 0;
    }

    @media (max-width: 550px) {
      .document-body {
        padding: 0.8rem 1rem;
      }
      #selectableText {
        font-size: 0.75rem;
        line-height: 1.4;
      }
      .action-panel {
        padding: 0.5rem 0.8rem;
      }
      button {
        padding: 0.35rem 1rem;
        font-size: 0.7rem;
      }
      .results-panel {
        padding: 0.6rem 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="document-card">
    <div class="document-body">
      <div id="selectableText"></div>
    </div>
  </div>

  <div class="action-panel">
    <div class="btn-group">
      <button id="checkBtn" class="primary">✓ Проверить</button>
      <button id="resetBtn" class="secondary">↺ Сбросить</button>
    </div>
  </div>

  <div id="resultsArea" class="results-panel">
    <div id="feedbackMessage" class="mistake-feedback"></div>
  </div>
</div>

<div id="correctSampleModal" class="sample-modal">
  <div class="modal-card">
    <button class="close-modal" id="closeModalBtn">&times;</button>
    <h3 style="margin-bottom: 0.7rem; font-size: 1.1rem; color: #1f6e9c;">📄 Правильный образец</h3>
    <div class="correct-doc-text" id="fullCorrectDocument"></div>
  </div>
</div>

<script>
  // Текст с ошибками (компактная версия без потери смысла)
  const mistakenDocumentText = `ДОВЕРЕННОСТЬ № 1

2026 год

Общество с ограниченной ответственностью «Альфа» (далее — «Общество», «Доверитель»), место нахождения: 165345, г. Москва, ул. Заднепровская, д. 7, ИНН 7708123456, ОГРН 1057741110111, в лице генерального директора Львова Александра Владимировича, действующего на основании Устава, уполномочивает налогового консультанта Глебовой Алле Сергеевне.

представлять интересы Общества в ИФНС с правом:

— подавать и подписывать заявления, письма, уведомления и другие документы;

— получать и подписывать акты, решения, требования, сообщения, уведомления, справки, в том числе справки об отсутствии задолженности по налогам и сборам, акты по результатам камеральной налоговой проверки;

— получать и подписывать справки по проведенной выездной налоговой проверке, акты по результатам выездной налоговой проверки, уведомления о вызове налогоплательщика, извещения о рассмотрении материалов выездной налоговой проверки, требования о представлении документов, решения о привлечении к ответственности за совершение налогового правонарушения или об отказе в привлечении к ответственности за совершение налогового правонарушения, иные решения и документы в рамках выездной налоговой проверки;

— представлять возражения на акт налогового контроля по результатам выездной налоговой проверки, участвовать в рассмотрении материалов выездной налоговой проверки с правом подписи, подавать все необходимые документы.

Доверенность выдана с правом без права передоверия.

Генеральный директор

ООО «Альфа» А. В. Львов`;

  // Правильный текст (эталон)
  const correctDocumentText = `ДОВЕРЕННОСТЬ № 1

23 января 2026 г.

Общество с ограниченной ответственностью «Альфа» (далее — «Общество», «Доверитель»), место нахождения: 165345, г. Москва, ул. Заднепровская, д. 7, ИНН 7708123456, ОГРН 1057741110111, в лице генерального директора Львова Александра Владимировича, действующего на основании Устава, уполномочивает налогового консультанта Глебовой Алле Сергеевне, паспорт гражданина России серии 4602 № 545177 выдан УВД Воскресенского района г. Московской области 15 апреля 2002 года, зарегистрированного по адресу: 125373, г. Москва, бул. Яна Райниса, д. 24, кв. 474.

представлять интересы Общества в Инспекции Федеральной налоговой службы по району Замоскворечье города Москвы код 7750 с правом:

— подавать и подписывать заявления, письма, уведомления и другие документы;

— получать и подписывать акты, решения, требования, сообщения, уведомления, справки, в том числе справки об отсутствии задолженности по налогам и сборам, акты по результатам камеральной налоговой проверки;

— получать и подписывать справки по проведенной выездной налоговой проверке, акты по результатам выездной налоговой проверки, уведомления о вызове налогоплательщика, извещения о рассмотрении материалов выездной налоговой проверки, требования о представлении документов, решения о привлечении к ответственности за совершение налогового правонарушения или об отказе в привлечении к ответственности за совершение налогового правонарушения, иные решения и документы в рамках выездной налоговой проверки;

— представлять возражения на акт налогового контроля по результатам выездной налоговой проверки, участвовать в рассмотрении материалов выездной налоговой проверки с правом подписи, подавать все необходимые документы.

Доверенность выдана с правом без права передоверия и действительна до 31 декабря 2026 года.

Генеральный директор

ООО «Альфа» А. В. Львов`;

  // Форматирование документа (стилизованный вывод)
  function formatDocument(text) {
    let lines = text.split('\n');
    let formattedLines = [];
    
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];
      
      if (line.includes('ДОВЕРЕННОСТЬ №')) {
        formattedLines.push(`<div class="doc-title">${escapeHtml(line)}</div>`);
      }
      else if (line.trim().match(/^\d{4}\s*год$/) || line.trim().match(/^\d{1,2}\s+\w+\s+\d{4}\s*г\.?$/)) {
        formattedLines.push(`<div class="doc-date-right">${escapeHtml(line.trim())}</div>`);
      }
      else if (line.includes('Генеральный директор')) {
        formattedLines.push(`<div style="margin-top: 0.6rem;">${escapeHtml(line)}</div>`);
      }
      else if (line.includes('ООО «Альфа»') && (line.includes('Львов') || line.match(/[А-Я]\.[А-Я]\.\s+[А-Я][а-я]+/))) {
        const match = line.match(/(ООО\s+«Альфа»)(.+)/);
        if (match) {
          formattedLines.push(`<div class="signature-line">
            <span class="signature-left">${escapeHtml(match[1])}</span>
            <span class="signature-right">${escapeHtml(match[2].trim())}</span>
          </div>`);
        } else {
          formattedLines.push(`<div>${escapeHtml(line)}</div>`);
        }
      }
      else if (line.trim() === '') {
        formattedLines.push('<br>');
      }
      else {
        formattedLines.push(`<div>${escapeHtml(line)}</div>`);
      }
    }
    
    return formattedLines.join('');
  }

  // 4 ошибки для поиска
  const errorDefinitions = [
    {
      id: 1,
      description: "Ошибка в дате: указан только год «2026 год». Нужна полная дата (число, месяц, год).",
      check: (text) => text.includes("2026") && !text.includes("2026 г.") && (text.trim().length < 15 || text.match(/^\s*2026\s*год/)),
      correctExample: "✓ Правильно: 23 января 2026 г."
    },
    {
      id: 2,
      description: "Некорректно указан налоговый орган: «ИФНС» без полного наименования и кода.",
      check: (text) => text.includes("ИФНС") && !text.includes("Инспекция Федеральной налоговой службы"),
      correctExample: "✓ Правильно: Инспекция Федеральной налоговой службы по району Замоскворечье г. Москвы код 7750"
    },
    {
      id: 3,
      description: "Отсутствуют паспортные данные представителя (серия, номер, кем выдан, адрес регистрации).",
      check: (text) => (text.includes("Глебовой") || text.includes("налогового консультанта")) && !text.includes("паспорт"),
      correctExample: "✓ После ФИО добавить: паспорт серии 4602 № 545177, выдан..., зарегистрирован по адресу..."
    },
    {
      id: 4,
      description: "Нет срока действия доверенности (фраза «действительна до ...» отсутствует).",
      check: (text) => (text.includes("Доверенность выдана") || text.includes("без права передоверия")) && !text.includes("действительна до"),
      correctExample: "✓ Добавить: и действительна до 31 декабря 2026 года"
    }
  ];

  let selectedSpans = [];  // храним созданные спаны-выделения

  // Обработчик выделения текста
  function handleTextSelection() {
    const selection = window.getSelection();
    if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return;
    
    const range = selection.getRangeAt(0);
    const selectedText = range.toString();
    if (selectedText.trim().length === 0) return;
    
    try {
      const span = document.createElement('span');
      span.className = 'selection-highlight';
      span.textContent = selectedText;
      span.setAttribute('data-original-text', selectedText);
      
      range.deleteContents();
      range.insertNode(span);
      selectedSpans.push(span);
      selection.removeAllRanges();
    } catch(e) {}
  }

  // Сброс всех выделений и возврат к исходному документу
  function resetAll() {
    for (let span of selectedSpans) {
      if (span && span.parentNode) {
        const textNode = document.createTextNode(span.textContent);
        span.parentNode.replaceChild(textNode, span);
      }
    }
    selectedSpans = [];
    
    const container = document.getElementById('selectableText');
    container.innerHTML = formatDocument(mistakenDocumentText);
    
    const resultsDiv = document.getElementById('resultsArea');
    resultsDiv.style.display = 'none';
  }

  // Оценка выделенных фрагментов
  function evaluateMistakes() {
    const foundErrorIds = new Set();
    
    for (let span of selectedSpans) {
      const text = span.textContent;
      let matchedErrorId = null;
      
      for (let error of errorDefinitions) {
        if (error.check(text)) {
          matchedErrorId = error.id;
          foundErrorIds.add(error.id);
          break;
        }
      }
      
      if (matchedErrorId) {
        span.classList.remove('selection-highlight');
        span.classList.add('mark-correct');
      } else {
        span.classList.remove('selection-highlight');
        span.classList.add('mark-wrong');
      }
    }
    
    const foundCount = foundErrorIds.size;
    const resultsDiv = document.getElementById('resultsArea');
    const feedbackDiv = document.getElementById('feedbackMessage');
    
    let html = `<div class="summary-badge">🏆 Найдено: ${foundCount} из 4 ошибок</div>`;
    html += `<div style="margin-top: 0.4rem;"><button id="viewDetailsBtn" class="outline" style="background:#eef3fc;">📋 Разобрать ошибки</button></div>`;
    html += `<div class="view-sample-btn"><button id="viewSampleAfterCheckBtn" class="outline" style="background:#eef3fc; border-color:#4caf50; color:#2e7d32;">📖 Эталон доверенности</button></div>`;
    
    feedbackDiv.innerHTML = html;
    resultsDiv.style.display = 'block';
    
    // Кнопка показа детального разбора
    const viewBtn = document.getElementById('viewDetailsBtn');
    if (viewBtn) {
      viewBtn.onclick = () => {
        let detailsHtml = `<div class="summary-badge">📋 Детальный разбор</div>`;
        for (let error of errorDefinitions) {
          const isFound = foundErrorIds.has(error.id);
          if (isFound) {
            detailsHtml += `<div class="error-item error-correct" style="margin-bottom:0.5rem;">
              <div style="color:#2e7d32; font-weight:500;">✅ ${error.description}</div>
              <div style="color:#555; font-size:0.75rem; margin-top:3px;">${error.correctExample}</div>
            </div>`;
          } else {
            detailsHtml += `<div class="error-item error-wrong" style="margin-bottom:0.5rem;">
              <div style="color:#c62828; font-weight:500;">❌ ${error.description}</div>
              <div style="color:#555; font-size:0.75rem; margin-top:3px;">${error.correctExample}</div>
            </div>`;
          }
        }
        detailsHtml += `<div class="view-sample-btn" style="margin-top:0.8rem;"><button id="viewSampleFromDetailsBtn" class="outline" style="border-color:#4caf50;">📖 Показать правильный образец</button></div>`;
        detailsHtml += `<div style="margin-top:0.5rem;"><button id="backToResultBtn" class="outline">← Назад</button></div>`;
        feedbackDiv.innerHTML = detailsHtml;
        
        document.getElementById('backToResultBtn')?.addEventListener('click', () => evaluateMistakes());
        document.getElementById('viewSampleFromDetailsBtn')?.addEventListener('click', () => showModal());
      };
    }
    
    const sampleBtn = document.getElementById('viewSampleAfterCheckBtn');
    if (sampleBtn) sampleBtn.onclick = () => showModal();
  }

  // Показать модальное окно с образцом
  const modal = document.getElementById('correctSampleModal');
  const fullCorrectSpan = document.getElementById('fullCorrectDocument');
  
  function showModal() {
    fullCorrectSpan.innerHTML = formatDocument(correctDocumentText);
    modal.style.display = 'flex';
  }

  // Инициализация документа и событий
  function initDocument() {
    const container = document.getElementById('selectableText');
    container.innerHTML = formatDocument(mistakenDocumentText);
    
    document.addEventListener('mouseup', function(e) {
      if (e.target.closest('button')) return;
      const selection = window.getSelection();
      if (selection && !selection.isCollapsed && selection.toString().trim().length > 0) {
        let node = selection.anchorNode;
        let inside = false;
        while(node) {
          if (node === container || (node.parentNode === container)) { inside = true; break; }
          node = node.parentNode;
        }
        if (inside) handleTextSelection();
      }
    });
  }

  document.getElementById('checkBtn').addEventListener('click', evaluateMistakes);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
  document.getElementById('closeModalBtn').addEventListener('click', () => modal.style.display = 'none');
  window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  initDocument();
</script>
</body>
</html>
