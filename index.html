<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Тренажёр: найди ошибки в доверенности</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f0f4f9;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
      padding: 2rem 1rem;
      color: #1a2c3e;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .document-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      margin-bottom: 1.2rem;
    }

    .document-body {
      padding: 1.5rem 1.8rem;
      line-height: 1.5;
      font-size: 0.9rem;
      background: #ffffff;
      user-select: text;
    }

    #selectableText {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.55;
    }

    /* Подсветка при выделении (синяя) */
    .selection-highlight {
      background-color: #5a9eff;
      color: white;
      border-radius: 3px;
      padding: 0 1px;
    }

    /* После проверки: правильно (зеленое) */
    .mark-correct {
      background-color: #4caf50;
      color: white;
      border-radius: 3px;
      padding: 0 1px;
    }

    /* После проверки: неправильно (красное) */
    .mark-wrong {
      background-color: #f44336;
      color: white;
      border-radius: 3px;
      padding: 0 1px;
    }

    .doc-date-right {
      text-align: right;
      margin-bottom: 0.8rem;
      font-weight: normal;
      font-size: 0.85rem;
    }

    .signature-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .signature-left {
      font-weight: normal;
    }

    .signature-right {
      font-weight: normal;
    }

    .doc-title {
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.8rem;
    }

    #selectableText::selection {
      background: #b8d9ff;
    }

    .action-panel {
      background: white;
      border-radius: 16px;
      padding: 0.6rem 1.2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .btn-group {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      font-family: inherit;
      font-weight: 500;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      background: #f0f4fa;
      color: #1f4d73;
      transition: all 0.2s;
    }

    button.primary {
      background: #1f6e9c;
      color: white;
    }

    button.primary:hover {
      background: #0f5a84;
      transform: translateY(-1px);
    }

    button.secondary {
      background: #eef3fc;
      border: 1px solid #cde2f5;
    }

    button.secondary:hover {
      background: #e2edfc;
    }

    button.outline {
      background: transparent;
      border: 1px solid #95CAFA;
      color: #1f6e9c;
    }

    .results-panel {
      background: #ffffff;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-top: 1rem;
      border-left: 3px solid #95CAFA;
      display: none;
    }

    .mistake-feedback {
      font-size: 0.85rem;
      line-height: 1.45;
      color: #2c3e50;
    }

    .mistake-feedback .error-item {
      margin-bottom: 0.6rem;
      padding: 0.4rem;
      border-radius: 10px;
    }

    .mistake-feedback .error-correct {
      background: #e8f5e9;
      border-left: 3px solid #4caf50;
    }

    .mistake-feedback .error-wrong {
      background: #ffebee;
      border-left: 3px solid #f44336;
    }

    .summary-badge {
      background: #eef3fc;
      padding: 0.4rem 0.8rem;
      border-radius: 10px;
      margin-bottom: 0.8rem;
      font-weight: 500;
      font-size: 0.85rem;
    }

    .view-sample-btn {
      margin-top: 0.8rem;
      text-align: center;
    }

    .sample-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-card {
      background: white;
      max-width: 750px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
      border-radius: 24px;
    }

    .close-modal {
      float: right;
      font-size: 1.5rem;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .correct-doc-text {
      font-family: 'Segoe UI', monospace;
      white-space: pre-wrap;
      font-size: 0.85rem;
      line-height: 1.5;
      background: #fafcff;
      padding: 0.8rem;
      border-radius: 16px;
      clear: both;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="document-card">
    <div class="document-body">
      <div id="selectableText" contenteditable="false"></div>
    </div>
  </div>

  <div class="action-panel">
    <div class="btn-group">
      <button id="checkBtn" class="primary">Проверить</button>
      <button id="resetBtn" class="secondary">Сбросить всё</button>
    </div>
  </div>

  <div id="resultsArea" class="results-panel">
    <div id="feedbackMessage" class="mistake-feedback"></div>
  </div>
</div>

<div id="correctSampleModal" class="sample-modal">
  <div class="modal-card">
    <button class="close-modal" id="closeModalBtn">&times;</button>
    <h3 style="margin-bottom: 0.8rem; color: #1f6e9c; font-size: 1.1rem;">Правильная доверенность</h3>
    <div class="correct-doc-text" id="fullCorrectDocument"></div>
  </div>
</div>

<script>
  const mistakenDocumentText = `ДОВЕРЕННОСТЬ № 1

2026 год

Общество с ограниченной ответственностью «Альфа» (далее — «Общество», «Доверитель»), место нахождения: 165345, г. Москва, ул. Заднепровская, д. 7, ИНН 7708123456, ОГРН 1057741110111, в лице генерального директора Львова Александра Владимировича, действующего на основании Устава, уполномочивает налогового консультанта Глебовой Алле Сергеевне.

представлять интересы Общества в ИФНС с правом:

— подавать и подписывать заявления, письма, уведомления и другие документы;

— получать и подписывать акты, решения, требования, сообщения, уведомления, справки, в том числе справки об отсутствии задолженности по налогам и сборам, акты по результатам камеральной налоговой проверки;

— получать и подписывать справки по проведенной выездной налоговой проверке, акты по результатам выездной налоговой проверки, уведомления о вызове налогоплательщика, извещения о рассмотрении материалов выездной налоговой проверки, требования о представлении документов, решения о привлечении к ответственности за совершение налогового правонарушения или об отказе в привлечении к ответственности за совершение налогового правонарушения, иные решения и документы в рамках выездной налоговой проверки;

— представлять возражения на акт налогового контроля по результатам выездной налоговой проверки, участвовать в рассмотрении материалов выездной налоговой проверки с правом подписи, подавать все необходимые документы.

Доверенность выдана с правом без права передоверия.

Генеральный директор

ООО «Альфа» А. В. Львов`;

  const correctDocumentText = `ДОВЕРЕННОСТЬ № 1

23 января 2026 г.

Общество с ограниченной ответственностью «Альфа» (далее — «Общество», «Доверитель»), место нахождения: 165345, г. Москва, ул. Заднепровская, д. 7, ИНН 7708123456, ОГРН 1057741110111, в лице генерального директора Львова Александра Владимировича, действующего на основании Устава, уполномочивает налогового консультанта Глебовой Алле Сергеевне, паспорт гражданина России серии 4602 № 545177 выдан УВД Воскресенского района г. Московской области 15 апреля 2002 года, зарегистрированного по адресу: 125373, г. Москва, бул. Яна Райниса, д. 24, кв. 474.

представлять интересы Общества в Инспекции Федеральной налоговой службы по району Замоскворечье города Москвы код 7750 с правом:

— подавать и подписывать заявления, письма, уведомления и другие документы;

— получать и подписывать акты, решения, требования, сообщения, уведомления, справки, в том числе справки об отсутствии задолженности по налогам и сборам, акты по результатам камеральной налоговой проверки;

— получать и подписывать справки по проведенной выездной налоговой проверке, акты по результатам выездной налоговой проверки, уведомления о вызове налогоплательщика, извещения о рассмотрении материалов выездной налоговой проверки, требования о представлении документов, решения о привлечении к ответственности за совершение налогового правонарушения или об отказе в привлечении к ответственности за совершение налогового правонарушения, иные решения и документы в рамках выездной налоговой проверки;

— представлять возражения на акт налогового контроля по результатам выездной налоговой проверки, участвовать в рассмотрении материалов выездной налоговой проверки с правом подписи, подавать все необходимые документы.

Доверенность выдана с правом без права передоверия и действительна до 31 декабря 2026 года.

Генеральный директор

ООО «Альфа» А. В. Львов`;

  function formatDocument(text) {
    let lines = text.split('\n');
    let formattedLines = [];
    
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];
      
      if (line.includes('ДОВЕРЕННОСТЬ №')) {
        formattedLines.push(`<div class="doc-title">${line}</div>`);
      }
      else if (line.trim().match(/^\d{4}\s*год$/) || line.trim().match(/^\d{1,2}\s+\w+\s+\d{4}\s*г\.?$/)) {
        formattedLines.push(`<div class="doc-date-right">${line.trim()}</div>`);
      }
      else if (line.includes('Генеральный директор')) {
        formattedLines.push(`<div style="margin-top: 0.8rem;">${line}</div>`);
      }
      else if (line.includes('ООО «Альфа»') && (line.includes('Львов') || line.match(/[А-Я]\.[А-Я]\.\s+[А-Я][а-я]+/))) {
        const match = line.match(/(ООО\s+«Альфа»)(.+)/);
        if (match) {
          formattedLines.push(`<div class="signature-line">
            <span class="signature-left">${match[1]}</span>
            <span class="signature-right">${match[2].trim()}</span>
          </div>`);
        } else {
          formattedLines.push(`<div>${line}</div>`);
        }
      }
      else if (line.trim() === '') {
        formattedLines.push('<br>');
      }
      else {
        formattedLines.push(`<div>${line}</div>`);
      }
    }
    
    return formattedLines.join('');
  }

  // Определение 4-х ошибок
  const errorDefinitions = [
    {
      id: 1,
      description: "1. Ошибка в дате: указали только год «2026 год». В доверенности обязательно должна быть полная дата (число, месяц, год), иначе доверенность недействительна.",
      check: (text) => text.includes("2026"),
      correctExample: "Правильно: 23 января 2026 г."
    },
    {
      id: 2,
      description: "2. Ошибка в указании налогового органа: Необходимо указать полное наименование: «Инспекция Федеральной налоговой службы по району... и код налогового органа».",
      check: (text) => text.includes("ИФНС"),
      correctExample: "Правильно: Инспекция Федеральной налоговой службы по району Замоскворечье города Москвы код 7750"
    },
    {
      id: 3,
      description: "3. Отсутствуют полные сведения о представителе: налоговый консультант указан только по имени (Глебовой Алле Сергеевне), но нет паспортных данных (серия, номер, кем выдан, дата) и адреса регистрации. Это нарушает требования к доверенности.",
      check: (text) => (text.includes("Глебовой") || text.includes("Глебовой Алле") || text.includes("налогового консультанта")) && !text.includes("паспорт"),
      correctExample: "Правильно: после ФИО добавить паспортные данные и адрес регистрации"
    },
    {
      id: 4,
      description: "4. Отсутствует срок действия доверенности: в документе нет указания, до какого числа действует доверенность.",
      check: (text) => (text.includes("Доверенность выдана") || text.includes("без права передоверия")) && !text.includes("действительна до"),
      correctExample: "Правильно: добавить «и действительна до 31 декабря 2026 года»"
    }
  ];

  let selectedSpans = [];

  function handleTextSelection() {
    const selection = window.getSelection();
    if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return;
    
    const range = selection.getRangeAt(0);
    const selectedText = range.toString();
    
    if (selectedText.trim().length === 0) return;
    
    try {
      const span = document.createElement('span');
      span.className = 'selection-highlight';
      span.textContent = selectedText;
      span.setAttribute('data-original-text', selectedText);
      
      range.deleteContents();
      range.insertNode(span);
      
      selectedSpans.push(span);
      selection.removeAllRanges();
    } catch(e) {
      console.warn('Ошибка при выделении', e);
    }
  }

  function clearAllHighlights() {
    for (let span of selectedSpans) {
      if (span && span.parentNode) {
        const textNode = document.createTextNode(span.textContent);
        span.parentNode.replaceChild(textNode, span);
      }
    }
    selectedSpans = [];
    const resultsDiv = document.getElementById('resultsArea');
    resultsDiv.style.display = 'none';
  }

  function evaluateMistakes() {
    const foundErrorIds = new Set();
    
    for (let span of selectedSpans) {
      const text = span.textContent;
      let isError = false;
      
      for (let error of errorDefinitions) {
        if (error.check(text)) {
          isError = true;
          foundErrorIds.add(error.id);
          break;
        }
      }
      
      if (isError) {
        span.classList.remove('selection-highlight');
        span.classList.add('mark-correct');
      } else {
        span.classList.remove('selection-highlight');
        span.classList.add('mark-wrong');
      }
    }
    
    const foundCount = foundErrorIds.size;
    const resultsDiv = document.getElementById('resultsArea');
    const feedbackDiv = document.getElementById('feedbackMessage');
    
    let html = `<div class="summary-badge">📊 Вы нашли ${foundCount} из 4 ошибок</div>`;
    html += `<div style="margin-top: 0.4rem;">
      <button id="viewDetailsBtn" class="outline" style="background: #eef3fc; font-size: 0.8rem;">Посмотреть список ошибок</button>
    </div>`;
    html += `<div class="view-sample-btn">
      <button id="viewSampleAfterCheckBtn" class="outline" style="background: #eef3fc; border-color: #4caf50; color: #2e7d32; font-size: 0.8rem;">📖 Посмотреть правильный образец</button>
    </div>`;
    
    feedbackDiv.innerHTML = html;
    resultsDiv.style.display = 'block';
    
    const viewBtn = document.getElementById('viewDetailsBtn');
    if (viewBtn) {
      viewBtn.onclick = () => {
        let detailsHtml = `<div class="summary-badge">📋 Подробный разбор ошибок</div>`;
        for (let error of errorDefinitions) {
          const isFound = foundErrorIds.has(error.id);
          if (isFound) {
            detailsHtml += `<div class="error-item error-correct" style="background: #e8f5e9; padding: 0.4rem; border-radius: 10px; margin-bottom: 0.6rem;">
              <div style="color: #2e7d32; font-weight: 500;">✅ ${error.description}</div>
              <div style="color: #555; margin-top: 4px; font-size: 0.8rem;">${error.correctExample}</div>
            </div>`;
          } else {
            detailsHtml += `<div class="error-item error-wrong" style="background: #ffebee; padding: 0.4rem; border-radius: 10px; margin-bottom: 0.6rem;">
              <div style="color: #c62828; font-weight: 500;">❌ ${error.description}</div>
              <div style="color: #555; margin-top: 4px; font-size: 0.8rem;">${error.correctExample}</div>
            </div>`;
          }
        }
        detailsHtml += `<div class="view-sample-btn" style="margin-top: 0.8rem;">
          <button id="viewSampleFromDetailsBtn" class="outline" style="background: #eef3fc; border-color: #4caf50; color: #2e7d32; font-size: 0.8rem;">📖 Посмотреть правильный образец</button>
        </div>`;
        detailsHtml += `<div style="margin-top: 0.4rem;">
          <button id="backToResultBtn" class="outline" style="font-size: 0.8rem;">← Назад к результату</button>
        </div>`;
        feedbackDiv.innerHTML = detailsHtml;
        
        const backBtn = document.getElementById('backToResultBtn');
        if (backBtn) backBtn.onclick = () => evaluateMistakes();
        const viewSampleBtn = document.getElementById('viewSampleFromDetailsBtn');
        if (viewSampleBtn) viewSampleBtn.onclick = () => showModal();
      };
    }
    
    const viewSampleBtn = document.getElementById('viewSampleAfterCheckBtn');
    if (viewSampleBtn) viewSampleBtn.onclick = () => showModal();
  }

  function resetAll() {
    for (let span of selectedSpans) {
      if (span && span.parentNode) {
        const textNode = document.createTextNode(span.textContent);
        span.parentNode.replaceChild(textNode, span);
      }
    }
    selectedSpans = [];
    const container = document.getElementById('selectableText');
    const formattedHtml = formatDocument(mistakenDocumentText);
    container.innerHTML = formattedHtml;
    const resultsDiv = document.getElementById('resultsArea');
    resultsDiv.style.display = 'none';
  }

  function initDocument() {
    const container = document.getElementById('selectableText');
    const formattedHtml = formatDocument(mistakenDocumentText);
    container.innerHTML = formattedHtml;
    
    document.addEventListener('mouseup', function(e) {
      if (e.target.closest('button')) return;
      const selection = window.getSelection();
      if (selection && !selection.isCollapsed && selection.toString().trim().length > 0) {
        let parent = selection.anchorNode;
        let insideContainer = false;
        while(parent) {
          if (parent === container || (parent.parentNode === container)) {
            insideContainer = true;
            break;
          }
          parent = parent.parentNode;
        }
        if (insideContainer) handleTextSelection();
      }
    });
  }

  const modal = document.getElementById('correctSampleModal');
  const fullCorrectSpan = document.getElementById('fullCorrectDocument');
  
  function showModal() {
    const formattedCorrect = formatDocument(correctDocumentText);
    fullCorrectSpan.innerHTML = formattedCorrect;
    modal.style.display = 'flex';
  }
  
  document.getElementById('checkBtn').addEventListener('click', evaluateMistakes);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
  document.getElementById('closeModalBtn').addEventListener('click', () => modal.style.display = 'none');
  window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
  
  initDocument();
</script>
</body>
</html>
